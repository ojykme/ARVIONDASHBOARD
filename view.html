<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARVION DASHBOARD - Realtime Image Cache & Compression Monitor</title>
  <link rel="stylesheet" href="src/dashboard/style.css" />
  <script src="src/dashboard/chart.js" defer></script>
  <script src="src/dashboard/view.js" defer></script>
</head>
<body>
  <!-- 로딩 오버레이 (인라인 SVG 스피너와 결합) -->
  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-panel">
      <div class="spinner"></div>
      <span class="loading-message">데이터 로드 중...</span>
    </div>
  </div>

  <!-- 토스트 알림 메시지 -->
  <div id="toast" class="toast" aria-live="polite" aria-atomic="true">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="toast-icon">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="16" x2="12" y2="12"></line>
      <line x1="12" y1="8" x2="12.01" y2="8"></line>
    </svg>
    <span class="toast-text">알림이 전송되었습니다.</span>
  </div>

  <!-- 메인 대시보드 쉘 -->
  <div class="dashboard-shell">
    
    <!-- 1. 헤더 영역 (타이틀, 필터, 테마 토글 등) -->
    <header class="dashboard-header">
      <div class="dashboard-title">
        <span class="dashboard-badge">ARVION</span>
        <div>
          <h1>ARVION DASHBOARD</h1>
          <p class="brand-sub">이미지 압축 실시간 모니터링 및 캐싱 시스템 현황</p>
        </div>
      </div>
      
      <div class="dashboard-actions">
        <!-- 테마 토글 버튼 (Sun/Moon SVG 교차 표시) -->
        <button id="themeToggleBtn" class="theme-toggle-btn" title="테마 전환" aria-label="테마 전환">
          <!-- 달 아이콘 (다크모드용) -->
          <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>

        <span class="action-label">필터링</span>
        <div id="filterContainer" class="filter-container">
          <button class="filter-btn active" data-filter="all">전체</button>
          <button class="filter-btn" data-filter="hit">HIT</button>
          <button class="filter-btn" data-filter="miss">MISS</button>
        </div>
        
        <button id="refreshButton" class="refresh-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          새로고침
        </button>
      </div>
    </header>

    <!-- 2. 통계 지표 그리드 요약 -->
    <section id="statsContainer" class="stats-grid"></section>

    <!-- 3. 실시간 트래픽 데이터 테이블 패널 -->
    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
              <line x1="15" y1="3" x2="15" y2="21"></line>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="3" y1="15" x2="21" y2="15"></line>
            </svg>
            실시간 이미지 트래픽
          </h2>
          <p>서버를 통해 실시간으로 최적화 및 캐싱되는 오리진 리소스 트래픽 명세입니다. 행을 클릭하여 이미지를 비교 분석하세요.</p>
        </div>
      </div>

      <div class="table-responsive">
        <table id="data-table">
          <thead>
            <tr>
              <th class="sortable" data-sort="url">요청 URL</th>
              <th class="sortable numeric" data-sort="originalSize">원본 크기</th>
              <th class="sortable numeric" data-sort="compressedSize">최적화 크기</th>
              <th class="sortable numeric" data-sort="compressionRatio">절감율</th>
              <th class="sortable numeric" data-sort="processingTime">처리 속도</th>
              <th class="sortable" data-sort="originalFormat">원본 포맷</th>
              <th class="sortable" data-sort="convertedFormat">변환 포맷</th>
              <th class="sortable" data-sort="cacheStatus">캐시 상태</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- 4. 통계 시각화 그래프 패널 -->
    <section id="chartContainer" class="panel chart-panel">
      <div class="panel-header">
        <div>
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--success)">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            실시간 파일 크기 대조 시각화 (Top 24)
          </h2>
          <p>가장 크기 절감 효과가 두드러지는 상위 24개 데이터의 크기 편차 비율 그래프입니다.</p>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="imageChart"></canvas>
      </div>
    </section>

  </div>

  <!-- 5. 모달 이미지 뷰어 상세 비교 (Esc 닫기 지원) -->
  <div id="imageViewer" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button type="button" class="close" aria-label="닫기">×</button>
      <div id="modalContent"></div>
    </div>
  </div>
</body>
</html>
